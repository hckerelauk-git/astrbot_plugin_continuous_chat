name: astrbot_plugin_continuous_chat
display_name: 持续对话
short_desc: 支持关键词/正则唤醒AstrBot，唤醒后可进入持续对话模式
desc: 支持关键词/正则唤醒 AstrBot，唤醒后可进入持续对话模式（群内所有消息自动触发 AI），支持白名单和私聊。
author: Soulter
version: v2.0.0
help: |
  ## 持续对话

  ### 指令
  - `/wbegin` — 手动进入持续对话状态（本群所有消息都会触发 AI）
  - `/wexit` — 手动退出持续对话状态
  - `/wgid` — 查看当前群聊 ID（用于白名单）

  ### 唤醒方式
  1. **关键词唤醒**：消息含关键词（如 "雪酱"）
  2. **正则唤醒**：消息匹配正则（re.search 模式）

  ### 持续对话
  - 被唤醒后自动进入持续对话，无需重复喊唤醒词
  - 超时自动退出，也可 /wexit 手动退出
  - 支持 reset_on_reply：每条消息重置计时
